# /etc/nginx/sites-available/jams
# JAMS at /  +  CV Builder at /cvbuilder/
# Replace YOUR_DOMAIN with your server IP or domain name.

server {
    listen 80;
    server_name YOUR_DOMAIN;

    client_max_body_size 50M;

    # --- CV Builder (subpath) ---

    location /cvbuilder/api/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
    }

    location = /cvbuilder {
        return 301 /cvbuilder/;
    }

    location /cvbuilder/ {
        alias /opt/cvbuilder/frontend/dist/;
        index index.html;
        try_files $uri $uri/ /cvbuilder/index.html;
    }

    # --- JAMS (root) ---

    root /opt/jams/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
    }

    location /api/chat {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }
}
